<!DOCTYPE html>
<html lang="en" manifest="scoreboard.appcache">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Court Scoreboard</title>
<style>
  /* iOS 9 / Safari 9 safe: no CSS grid, no custom properties, prefixed flexbox */
  * { margin:0; padding:0; box-sizing:border-box;
      -webkit-user-select:none; user-select:none;
      -webkit-touch-callout:none; -webkit-tap-highlight-color:rgba(0,0,0,0); }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:#0e1512;
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    color:#f2f5f2;
  }
  .wrap { position:absolute; top:0; left:0; right:0; bottom:0;
          display:-webkit-flex; display:flex;
          -webkit-flex-direction:column; flex-direction:column; }

  .board { -webkit-flex:1; flex:1;
           display:-webkit-flex; display:flex; -webkit-flex-direction:row; flex-direction:row; }

  .lane { position:relative; -webkit-flex:1; flex:1;
          display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column;
          overflow:hidden; }
  .lane-a { background:#171f1b; }
  .lane-b { background:#141b20; }
  .lane.win { background:#1c2a20; }

  .accent { height:1.4vh; width:100%; }
  .lane-a .accent { background:#ff7a1a; }
  .lane-b .accent { background:#2e9bff; }

  .head { padding:2vh 3vw 0;
          display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column;
          -webkit-align-items:center; align-items:center; }
  .namerow { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center;
             -webkit-justify-content:center; justify-content:center; }
  .name { font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
          font-size:4.6vh; line-height:1; white-space:nowrap; overflow:hidden;
          text-overflow:ellipsis; max-width:60vw;
          border-bottom:0.3vh dotted rgba(255,255,255,0.28); padding-bottom:0.5vh; }
  .lane-a .name { color:#ff9a4d; }
  .lane-b .name { color:#5fb4ff; }

  /* optic-yellow ball = serve indicator */
  .ball { width:3vh; height:3vh; border-radius:50%;
          background:#d7ff3e; margin-left:1.6vh;
          box-shadow:0 0 0 0.5vh rgba(215,255,62,0.18);
          visibility:hidden; }
  .ball.on { visibility:visible; }

  .chips { margin-top:1.3vh; height:3.6vh;
           display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; }
  .chip { font-size:2.2vh; font-weight:600; letter-spacing:0.03em;
          padding:0.7vh 2vw; border-radius:0.9vh; margin:0 0.6vw;
          background:rgba(215,255,62,0.14); color:#d7ff3e; display:none; }
  .chip.on { display:inline-block; }

  .pips { display:-webkit-flex; display:flex; -webkit-justify-content:center; justify-content:center;
          margin-top:1vh; }
  .pip { width:1.7vh; height:1.7vh; border-radius:50%; margin:0 0.55vh;
         background:rgba(255,255,255,0.16); }
  .lane-a .pip.filled { background:#ff7a1a; }
  .lane-b .pip.filled { background:#2e9bff; }

  .hit { -webkit-flex:1; flex:1; position:relative;
         display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center;
         -webkit-justify-content:center; justify-content:center; cursor:pointer; }
  .score { font-size:46vh; font-weight:800; line-height:0.9; letter-spacing:-0.02em; position:relative; }
  .score:after { content:""; position:absolute; left:-6%; right:-6%; top:50%; height:0.5vh;
                 margin-top:-0.25vh; background:rgba(0,0,0,0.35); }
  .lane.win .score { color:#d7ff3e; }

  .lane-bottom { padding:0 3vw 2.2vh;
                 display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center;
                 -webkit-justify-content:center; justify-content:center; }
  .minus { width:9vh; height:5.6vh; border-radius:1.2vh; border:none;
           background:rgba(255,255,255,0.08); color:#f2f5f2; font-size:3.6vh; font-weight:700; line-height:1; }
  .minus:active { background:rgba(255,255,255,0.2); }

  .divider { width:0.4vw; background:#0e1512; }

  .bar { height:8.5vh; background:#0b100e;
         display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center;
         -webkit-justify-content:space-between; justify-content:space-between; padding:0 2.4vw; }
  .status { display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; }
  .call { font-size:2.8vh; font-weight:700; color:#e8ede9; letter-spacing:0.04em; white-space:nowrap; }
  .format { font-size:1.9vh; color:#7f8b83; letter-spacing:0.03em; white-space:nowrap; margin-top:0.4vh; }
  .btns { display:-webkit-flex; display:flex; }
  .btn { background:rgba(255,255,255,0.07); color:#e8ede9; border:none;
         font-size:2.3vh; font-weight:600; padding:1.4vh 2.4vw; margin-left:1.2vw;
         border-radius:1vh; white-space:nowrap; }
  .btn:active { background:rgba(255,255,255,0.2); }

  .toast { position:absolute; top:3vh; left:50%; margin-left:-22vw; width:44vw;
           text-align:center; background:#d7ff3e; color:#0e1512;
           font-size:3.4vh; font-weight:800; letter-spacing:0.04em; padding:1.6vh 0;
           border-radius:1.2vh; opacity:0; -webkit-transition:opacity 0.18s; transition:opacity 0.18s;
           pointer-events:none; }
  .toast.show { opacity:1; }

  .banner { position:absolute; top:0; left:0; right:0; bottom:0;
            background:rgba(8,12,10,0.94); display:none;
            -webkit-flex-direction:column; flex-direction:column;
            -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; }
  .banner.show { display:-webkit-flex; display:flex; }
  .banner .big { font-size:7.5vh; font-weight:800; text-align:center; padding:0 6vw; }
  .banner .sub { font-size:3.2vh; color:#9aa79f; margin-top:1.4vh; }
  .banner .go { margin-top:5vh; background:#d7ff3e; color:#0e1512; font-weight:800;
                font-size:3.4vh; padding:2vh 8vw; border:none; border-radius:1.4vh; }

  .overlay { position:absolute; top:0; left:0; right:0; bottom:0;
             background:rgba(8,12,10,0.97); display:none;
             -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; }
  .overlay.show { display:-webkit-flex; display:flex; }
  .panel { width:86vw; max-width:820px;
           display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; }
  .grp { margin-bottom:2.6vh; }
  .grp .label { font-size:2.3vh; color:#8b978f; margin-bottom:1.2vh; letter-spacing:0.05em; text-transform:uppercase; }
  .opts { display:-webkit-flex; display:flex; -webkit-flex-wrap:wrap; flex-wrap:wrap; }
  .opt { background:rgba(255,255,255,0.08); color:#e8ede9; border:none; font-size:2.7vh; font-weight:600;
         padding:1.6vh 3.4vw; margin:0 1.4vw 1.4vh 0; border-radius:1.2vh; }
  .opt.sel { background:#d7ff3e; color:#0e1512; }
  .close { margin-top:1.4vh; background:rgba(255,255,255,0.12); color:#f2f5f2; border:none;
           font-size:2.8vh; font-weight:700; padding:1.8vh; border-radius:1.4vh; }
  .danger { background:rgba(255,90,70,0.16); color:#ff8a76; }
</style>
</head>
<body>
<div class="wrap">
  <div class="board">
    <div class="lane lane-a" id="lane0">
      <div class="accent"></div>
      <div class="head">
        <div class="namerow"><div class="name" id="name0">Team A</div><div class="ball" id="ball0"></div></div>
        <div class="chips"><span class="chip" id="court0"></span><span class="chip" id="srv0"></span></div>
      </div>
      <div class="pips" id="pips0"></div>
      <div class="hit" id="hit0"><div class="score" id="score0">0</div></div>
      <div class="lane-bottom"><button class="minus" id="minus0">&minus;</button></div>
    </div>

    <div class="divider"></div>

    <div class="lane lane-b" id="lane1">
      <div class="accent"></div>
      <div class="head">
        <div class="namerow"><div class="name" id="name1">Team B</div><div class="ball" id="ball1"></div></div>
        <div class="chips"><span class="chip" id="court1"></span><span class="chip" id="srv1"></span></div>
      </div>
      <div class="pips" id="pips1"></div>
      <div class="hit" id="hit1"><div class="score" id="score1">0</div></div>
      <div class="lane-bottom"><button class="minus" id="minus1">&minus;</button></div>
    </div>
  </div>

  <div class="bar">
    <div class="status">
      <div class="call" id="call">0 &middot; 0 &middot; 2</div>
      <div class="format" id="format">Pickleball &middot; Doubles &middot; to 11 &middot; Best of 3</div>
    </div>
    <div class="btns">
      <button class="btn" id="undo">Undo</button>
      <button class="btn" id="serveBtn">Pass serve</button>
      <button class="btn" id="swap">Swap ends</button>
      <button class="btn" id="newgame">New game</button>
      <button class="btn" id="menuBtn">Menu</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="banner" id="banner">
  <div class="big" id="bannerBig"></div>
  <div class="sub" id="bannerSub"></div>
  <button class="go" id="bannerGo">Next game</button>
</div>

<div class="overlay" id="overlay">
  <div class="panel">
    <div class="grp">
      <div class="label">Team names</div>
      <div class="opts">
        <button class="opt" id="rn0">Rename A</button>
        <button class="opt" id="rn1">Rename B</button>
      </div>
    </div>
    <div class="grp">
      <div class="label">Sport</div>
      <div class="opts">
        <button class="opt" id="sp_pickle">Pickleball</button>
        <button class="opt" id="sp_badminton">Badminton</button>
        <button class="opt" id="sp_custom">Custom&hellip;</button>
      </div>
    </div>
    <div class="grp">
      <div class="label">Players</div>
      <div class="opts">
        <button class="opt" id="pl_singles">Singles</button>
        <button class="opt" id="pl_doubles">Doubles</button>
      </div>
    </div>
    <div class="grp" id="scoreGrp">
      <div class="label">Scoring</div>
      <div class="opts">
        <button class="opt" id="sc_sideout">Side-out</button>
        <button class="opt" id="sc_rally">Rally</button>
      </div>
    </div>
    <div class="grp">
      <div class="label">Match length</div>
      <div class="opts">
        <button class="opt" id="bo_1">Single game</button>
        <button class="opt" id="bo_3">Best of 3</button>
        <button class="opt" id="bo_5">Best of 5</button>
      </div>
    </div>
    <div class="grp">
      <div class="opts"><button class="opt danger" id="resetMatch">Reset match</button></div>
    </div>
    <button class="close" id="closeMenu">Close</button>
  </div>
</div>

<script>
(function () {
  "use strict";
  var KEY = "court_scoreboard_v2";

  var state = {
    sport: "pickleball",
    play: "doubles",
    scoring: "sideout",       // "sideout" or "rally"; badminton is always rally
    target: 11, winBy: 2, cap: 0,
    bestOf: 3,
    scores: [0, 0],
    games: [0, 0],
    names: ["Team A", "Team B"],
    serveTeam: 0,
    serverNum: 2,             // pickleball doubles side-out starts on server 2 (the 0-0-2 rule)
    gameEnded: false,
    matchEnded: false,
    lastGameWinner: -1
  };
  var history = [];

  function other(i) { return i === 0 ? 1 : 0; }
  function needed() { return Math.floor(state.bestOf / 2) + 1; }
  function isDoublesSideout() { return state.scoring === "sideout" && state.play === "doubles"; }
  function startServerNum() { return isDoublesSideout() ? 2 : 1; }

  function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }
  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) { var s = JSON.parse(raw); for (var k in s) { if (s.hasOwnProperty(k)) state[k] = s[k]; } }
    } catch (e) {}
  }
  function pushHistory() { history.push(JSON.stringify(state)); if (history.length > 80) history.shift(); }

  function isGameWon(a, b) {
    if (state.cap > 0 && a >= state.cap) return a > b;
    return a >= state.target && (a - b) >= state.winBy;
  }
  function checkWin(i) {
    if (isGameWon(state.scores[i], state.scores[other(i)])) {
      state.games[i] += 1;
      state.gameEnded = true;
      state.lastGameWinner = i;
      if (state.games[i] >= needed()) state.matchEnded = true;
    }
  }

  // A tap means: this side WON the rally.
  function rallyWon(winner) {
    if (state.gameEnded || state.matchEnded) return;
    pushHistory();

    if (state.scoring === "rally") {
      state.scores[winner] += 1;
      state.serveTeam = winner;
      state.serverNum = 1;
      checkWin(winner);
      render(); save();
      return;
    }

    // side-out scoring
    if (winner === state.serveTeam) {
      state.scores[state.serveTeam] += 1;   // only the serving side scores
      checkWin(state.serveTeam);
      render(); save();
    } else {
      // receiving side won the rally -> no point
      if (state.play === "doubles" && state.serverNum === 1) {
        state.serverNum = 2;
        render(); save(); toast("2nd server");
      } else {
        state.serveTeam = winner;           // side out
        state.serverNum = 1;
        render(); save(); toast("Side out");
      }
    }
  }

  function subPoint(i) {
    pushHistory();
    if (state.scores[i] > 0) state.scores[i] -= 1;
    if (state.gameEnded &&
        !isGameWon(state.scores[0], state.scores[1]) &&
        !isGameWon(state.scores[1], state.scores[0])) {
      state.gameEnded = false; state.matchEnded = false;
    }
    render(); save();
  }

  function passServe() {
    pushHistory();
    state.serveTeam = other(state.serveTeam);
    state.serverNum = 1;
    render(); save();
  }
  function toggleServerNum() {
    if (!isDoublesSideout()) return;
    pushHistory();
    state.serverNum = state.serverNum === 1 ? 2 : 1;
    render(); save();
  }

  function newGame() {
    pushHistory();
    state.scores = [0, 0];
    state.gameEnded = false; state.matchEnded = false;
    state.serveTeam = state.lastGameWinner >= 0 ? state.lastGameWinner : 0;
    state.serverNum = startServerNum();
    render(); save();
  }
  function swapEnds() {
    pushHistory();
    state.scores.reverse(); state.games.reverse(); state.names.reverse();
    state.serveTeam = other(state.serveTeam);
    if (state.lastGameWinner >= 0) state.lastGameWinner = other(state.lastGameWinner);
    render(); save();
  }
  function resetMatch() {
    pushHistory();
    state.scores = [0, 0]; state.games = [0, 0];
    state.serveTeam = 0; state.serverNum = startServerNum();
    state.gameEnded = false; state.matchEnded = false; state.lastGameWinner = -1;
    render(); save();
  }
  function undo() { if (history.length) { state = JSON.parse(history.pop()); render(); save(); } }

  function rename(i) {
    var n = window.prompt("Team name", state.names[i]);
    if (n !== null) { n = n.replace(/^\s+|\s+$/g, ""); if (n) state.names[i] = n; render(); save(); }
  }

  function setSport(sport) {
    state.sport = sport;
    if (sport === "pickleball") { state.target = 11; state.winBy = 2; state.cap = 0; state.scoring = "sideout"; }
    else if (sport === "badminton") { state.target = 21; state.winBy = 2; state.cap = 30; state.scoring = "rally"; }
    else if (sport === "custom") {
      var t = parseInt(window.prompt("Points to win a game", state.target), 10); if (!t || t < 1) t = state.target;
      var w = parseInt(window.prompt("Win by how many?", state.winBy), 10); if (!w || w < 1) w = 1;
      var c = parseInt(window.prompt("Hard cap (0 for none)", state.cap || 0), 10); if (isNaN(c) || c < 0) c = 0;
      state.target = t; state.winBy = w; state.cap = c;
    }
    resetMatch(); renderMenu();
  }

  var $ = function (id) { return document.getElementById(id); };
  var toastTimer = null;
  function toast(msg) {
    var t = $("toast");
    t.innerHTML = msg; t.className = "toast show";
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.className = "toast"; }, 1400);
  }

  function courtLabel() { return state.scores[state.serveTeam] % 2 === 0 ? "Right court" : "Left court"; }
  function sportName() { return state.sport === "pickleball" ? "Pickleball" : (state.sport === "badminton" ? "Badminton" : "Custom"); }

  function renderPips(i) {
    var el = $("pips" + i), need = needed(), html = "";
    for (var g = 0; g < need; g++) html += '<div class="pip' + (g < state.games[i] ? " filled" : "") + '"></div>';
    el.innerHTML = html;
  }

  function render() {
    for (var i = 0; i < 2; i++) {
      $("name" + i).innerHTML = ""; $("name" + i).appendChild(document.createTextNode(state.names[i]));
      var sc = String(state.scores[i]);
      var el = $("score" + i);
      el.innerHTML = sc;
      el.style.fontSize = (sc.length <= 1 ? 64 : (sc.length === 2 ? 46 : 32)) + "vh";
      $("ball" + i).className = "ball" + (state.serveTeam === i ? " on" : "");
      renderPips(i);
      var serving = (state.serveTeam === i);
      $("court" + i).className = "chip" + (serving ? " on" : "");
      $("court" + i).innerHTML = courtLabel();
      var showSrv = serving && isDoublesSideout();
      $("srv" + i).className = "chip" + (showSrv ? " on" : "");
      $("srv" + i).innerHTML = "Server " + state.serverNum;
    }
    var winSide = -1;
    if (state.gameEnded) winSide = state.scores[0] > state.scores[1] ? 0 : 1;
    $("lane0").className = "lane lane-a" + (winSide === 0 ? " win" : "");
    $("lane1").className = "lane lane-b" + (winSide === 1 ? " win" : "");

    // score call
    var callTxt;
    if (state.scoring === "sideout") {
      var sv = state.scores[state.serveTeam], rc = state.scores[other(state.serveTeam)];
      callTxt = (state.play === "doubles")
        ? (sv + " \u00b7 " + rc + " \u00b7 " + state.serverNum)
        : (sv + " \u00b7 " + rc);
    } else {
      callTxt = "Serving: " + state.names[state.serveTeam];
    }
    $("call").innerHTML = callTxt;

    var fmt = sportName() + " \u00b7 " + (state.play === "doubles" ? "Doubles" : "Singles") +
              " \u00b7 to " + state.target + (state.cap > 0 ? " (cap " + state.cap + ")" : "") +
              " \u00b7 " + (state.bestOf === 1 ? "Single game" : "Best of " + state.bestOf);
    $("format").innerHTML = fmt;

    if (state.matchEnded) {
      var mw = state.games[0] > state.games[1] ? 0 : 1;
      $("bannerBig").innerHTML = state.names[mw] + " wins the match";
      $("bannerSub").innerHTML = "Games " + state.games[0] + " \u2013 " + state.games[1];
      $("bannerGo").innerHTML = "New match";
      $("banner").className = "banner show";
    } else if (state.gameEnded) {
      var gw = state.scores[0] > state.scores[1] ? 0 : 1;
      $("bannerBig").innerHTML = state.names[gw] + " wins the game";
      $("bannerSub").innerHTML = state.scores[0] + " \u2013 " + state.scores[1] +
        "   \u2022   Games " + state.games[0] + " \u2013 " + state.games[1];
      $("bannerGo").innerHTML = "Next game";
      $("banner").className = "banner show";
    } else { $("banner").className = "banner"; }
  }

  function renderMenu() {
    function sel(id, on) { $(id).className = "opt" + (on ? " sel" : ""); }
    sel("sp_pickle", state.sport === "pickleball");
    sel("sp_badminton", state.sport === "badminton");
    sel("sp_custom", state.sport === "custom");
    sel("pl_singles", state.play === "singles");
    sel("pl_doubles", state.play === "doubles");
    sel("sc_sideout", state.scoring === "sideout");
    sel("sc_rally", state.scoring === "rally");
    sel("bo_1", state.bestOf === 1);
    sel("bo_3", state.bestOf === 3);
    sel("bo_5", state.bestOf === 5);
    // badminton is rally-only; hide the scoring toggle for it
    $("scoreGrp").style.display = (state.sport === "badminton") ? "none" : "block";
    $("sp_custom").innerHTML = state.sport === "custom" ? ("Custom \u00b7 " + state.target) : "Custom\u2026";
    $("rn0").innerHTML = ""; $("rn0").appendChild(document.createTextNode(state.names[0]));
    $("rn1").innerHTML = ""; $("rn1").appendChild(document.createTextNode(state.names[1]));
  }

  function tap(el, fn) {
    var moved = false;
    el.addEventListener("touchstart", function () { moved = false; }, false);
    el.addEventListener("touchmove", function () { moved = true; }, false);
    el.addEventListener("touchend", function (e) { if (!moved) { e.preventDefault(); fn(e); } }, false);
    el.addEventListener("click", function (e) { fn(e); }, false);
  }

  tap($("hit0"), function () { rallyWon(0); });
  tap($("hit1"), function () { rallyWon(1); });
  tap($("minus0"), function () { subPoint(0); });
  tap($("minus1"), function () { subPoint(1); });
  tap($("name0"), function () { rename(0); });
  tap($("name1"), function () { rename(1); });
  tap($("srv0"), toggleServerNum);
  tap($("srv1"), toggleServerNum);
  tap($("undo"), undo);
  tap($("serveBtn"), passServe);
  tap($("swap"), swapEnds);
  tap($("newgame"), newGame);
  tap($("menuBtn"), function () { renderMenu(); $("overlay").className = "overlay show"; });
  tap($("closeMenu"), function () { $("overlay").className = "overlay"; });
  tap($("bannerGo"), function () { newGame(); });
  tap($("rn0"), function () { rename(0); renderMenu(); });
  tap($("rn1"), function () { rename(1); renderMenu(); });

  tap($("sp_pickle"), function () { setSport("pickleball"); });
  tap($("sp_badminton"), function () { setSport("badminton"); });
  tap($("sp_custom"), function () { setSport("custom"); });
  tap($("pl_singles"), function () { state.play = "singles"; resetMatch(); renderMenu(); });
  tap($("pl_doubles"), function () { state.play = "doubles"; resetMatch(); renderMenu(); });
  tap($("sc_sideout"), function () { if (state.sport !== "badminton") { state.scoring = "sideout"; resetMatch(); renderMenu(); } });
  tap($("sc_rally"), function () { if (state.sport !== "badminton") { state.scoring = "rally"; resetMatch(); renderMenu(); } });
  tap($("bo_1"), function () { state.bestOf = 1; render(); renderMenu(); save(); });
  tap($("bo_3"), function () { state.bestOf = 3; render(); renderMenu(); save(); });
  tap($("bo_5"), function () { state.bestOf = 5; render(); renderMenu(); save(); });
  tap($("resetMatch"), function () { resetMatch(); renderMenu(); });

  document.addEventListener("gesturestart", function (e) { e.preventDefault(); }, false);
  document.addEventListener("touchmove", function (e) { if (e.scale && e.scale !== 1) e.preventDefault(); }, false);

  load();
  render();
})();
</script>
</body>
</html>
